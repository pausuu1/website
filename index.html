<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pausuu — Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      /* faster fade-in */
      opacity: 0;
      animation: fadeIn 0.9s ease-out forwards;
    }

    /* Top-left link */
    .top-left {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.7;
      transition: 0.25s ease;
    }

    .top-left:hover {
      opacity: 1;
    }

    /* Top-right nav */
    .nav {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 20px;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.7;
      transition: 0.25s ease;
    }

    .nav a:hover {
      opacity: 1;
    }

    .container {
      max-width: 600px;
      padding: 20px;

      /* faster fade-up */
      opacity: 0;
      animation: fadeUp 1s ease-out forwards;
      animation-delay: 0.15s;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-top: 5px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- Top-left link -->
  <a class="top-left" href="https://pausuu.xyz">pausuu.xyz</a>

  <!-- Top-right nav -->
  <div class="nav">
    <a href="https://pausuu.xyz">Home</a>
    <a href="mailto:pausuubusiness@gmail.com">Contact</a>
  </div>

  <!-- Main content -->
  <div class="container">
    <h1>Pausuu</h1>
    <p>Developer • Editor • Digital Creator</p>
  </div>

</body>
</html>
